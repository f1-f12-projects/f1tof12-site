name: F1toF12 Deploy to Dev

on:
  push:
    branches: [dev]
  workflow_dispatch:

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - run: npm ci    

    - run: |
        echo "REACT_APP_BASE_URL=https://dev-api.f1tof12.com" > .env
        echo "REACT_APP_CLOUDFRONT_SECRET=${{ secrets.DEV_REACT_APP_CLOUDFRONT_SECRET }}" >> .env
        echo "REACT_APP_TURNSTILE_SITE_KEY=${{ secrets.REACT_APP_TURNSTILE_SITE_KEY }}" >> .env
        cat endpoints.env >> .env
    
    - run: npm run build
    
    - run: aws s3 sync build/ s3://${{ secrets.DEV_S3_BUCKET }} --delete

    - name: Configure CloudFront SPA error handling
      run: |
        DIST_ID="${{ secrets.DEV_CLOUDFRONT_DISTRIBUTION_ID }}"
        RESULT=$(aws cloudfront get-distribution-config --id "$DIST_ID")
        ETAG=$(echo "$RESULT" | jq -r '.ETag')
        CONFIG=$(echo "$RESULT" | jq '.DistributionConfig | .CustomErrorResponses = {
          "Quantity": 2,
          "Items": [
            {
              "ErrorCode": 403,
              "ResponsePagePath": "/index.html",
              "ResponseCode": "200",
              "ErrorCachingMinTTL": 0
            },
            {
              "ErrorCode": 404,
              "ResponsePagePath": "/index.html",
              "ResponseCode": "200",
              "ErrorCachingMinTTL": 0
            }
          ]
        }')
        aws cloudfront update-distribution --id "$DIST_ID" --if-match "$ETAG" --distribution-config "$CONFIG"

    - run: aws cloudfront create-invalidation --distribution-id ${{ secrets.DEV_CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"