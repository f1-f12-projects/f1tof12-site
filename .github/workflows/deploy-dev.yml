name: F1toF12 Deploy to Dev

on:
  push:
    branches: [dev]
  workflow_dispatch:

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - run: npm ci
    
    - run: |
        aws ssm put-parameter --name "/f1tof12/dev/cloudfront/secret-value" --value "${{ secrets.DEV_REACT_APP_CLOUDFRONT_SECRET }}" --type "SecureString" --overwrite || true
    
    - run: npm run build:dev
    
    - run: |
        aws s3 sync build/ s3://${{ secrets.DEV_S3_BUCKET }} --delete
        aws cloudfront create-invalidation --distribution-id ${{ secrets.DEV_CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"